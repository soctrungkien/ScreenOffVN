name: Build ScreenOffVN - Debug Mode

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    tags: [ 'v*.*' ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Chạy build Debug + Kiểm tra chi tiết
        shell: cmd
        run: |
          echo ======================================
          echo Dang build ScreenOffVN Debug - Hack mode full ON
          echo ======================================
          gradlew.bat clean --no-daemon
          gradlew.bat assembleDebug --no-daemon --stacktrace

      - name: Tim toan bo file trong build folder
        shell: cmd
        run: |
          echo ======================================
          echo === TIM TAT CA FILE TRONG THU MUC BUILD ===
          dir /s /b build\outputs
          echo ======================================
          echo === TIM TAT CA FILE .APK O MOI NOI ===
          dir /s /b *.apk
          echo ======================================

      - name: Kiem tra cau truc project
        shell: cmd
        run: |
          echo === Cac file gradle quan trong ===
          dir /b *.gradle
          dir /b /s settings.gradle
          dir /b /s build.gradle
          echo ======================================

      - name: Upload logs neu co loi
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            **/*.log
            **/build/reports/*
