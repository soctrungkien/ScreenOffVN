name: Build ScreenOffVN

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    tags: [ 'v*.*' ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Setup Android SDK trên Windows
        uses: android-actions/setup-android@v3

      - name: Chạy build Debug
        shell: cmd
        run: |
          echo ======================================
          echo Dang build ScreenOffVN Debug - Hack mode full ON
          echo ======================================
          gradlew.bat clean --no-daemon
          gradlew.bat assembleDebug --no-daemon

      - name: Copy APK ra gốc + rename
        shell: cmd
        run: copy app\build\outputs\apk\debug\app-debug.apk ScreenOffVN-v${{ github.ref_name || 'latest' }}.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ScreenOffVN-APK
          path: ScreenOffVN-*.apk

      - name: Tạo GitHub Release V${{ github.ref_name }} Latest
        if: startsWith(github.ref, 'refs/tags/v')
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: V${{ github.ref_name }} Latest
          body: |
            Build
          artifacts: ScreenOffVN-*.apk
          draft: false
          prerelease: false
