name: Build ScreenOffVN

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    tags: [ 'v*.*' ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Setup Android SDK trên Windows
        uses: android-actions/setup-android@v3

      - name: Chạy build Debug 🔥
        shell: cmd
        run: |
          echo ======================================
          echo Dang build ScreenOffVN Debug - Hack mode full ON
          echo ======================================
          gradlew.bat clean --no-daemon
          gradlew.bat assembleDebug --no-daemon

      - name: Tim file APK o moi noi
        shell: cmd
        run: |
          echo ======================================
          echo === TIM TAT CA FILE .APK TRONG PROJECT ===
          dir /s /b *.apk
          echo ======================================

      - name: Copy APK ra goc + rename dep vl
        shell: cmd
        run: |
          echo Dang tim va copy APK...
          for /r %%f in (*.apk) do (
            echo Tim thay: %%f
            copy "%%f" ScreenOffVN-v${{ github.ref_name || 'latest' }}.apk
            echo Copy thanh cong! Ten file: ScreenOffVN-v${{ github.ref_name || 'latest' }}.apk
            goto :done
          )
          echo Khong tim thay file APK nao!
          :done

      - name: Upload APK cho ae tai
        uses: actions/upload-artifact@v4
        with:
          name: ScreenOffVN-APK
          path: ScreenOffVN-*.apk

      - name: Tao GitHub Release V${{ github.ref_name }} Latest
        if: startsWith(github.ref, 'refs/tags/v')
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: V${{ github.ref_name }} Latest
          body: |
            Merge pull request tu main

            Tai **ScreenOffVN-v${{ github.ref_name }}.apk** ve xai luon bro! 💥
          artifacts: ScreenOffVN-*.apk
          draft: false
          prerelease: false
