name: Build ScreenOffVN - Debug Siêu Chi Tiết

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: In ra cau truc project
        shell: cmd
        run: |
          echo ======================================
          echo === CAC FILE GRADLE QUAN TRONG ===
          dir /s /b *.gradle
          echo ======================================
          echo === NOI DUNG settings.gradle ===
          type settings.gradle 2>nul || echo Khong co settings.gradle
          echo ======================================
          echo === NOI DUNG build.gradle (root) ===
          type build.gradle 2>nul || echo Khong co build.gradle
          echo ======================================

      - name: Chay Gradle tasks de xem co task nao build APK khong
        shell: cmd
        run: |
          gradlew.bat tasks --all | findstr "assemble"
