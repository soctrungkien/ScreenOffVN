name: Build ScreenOffVN 🔥

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
    tags: [ 'v*.*' ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Debug APK (module app)
        shell: cmd
        run: |
          echo ======================================
          echo Dang build ScreenOffVN Debug - Hack mode full ON
          echo ======================================
          gradlew.bat :app:clean --no-daemon
          gradlew.bat :app:assembleDebug --no-daemon

      - name: Tim va Copy APK thong minh
        shell: cmd
        run: |
          echo === Tim file APK ===
          dir /s /b app\build\outputs\apk\debug\*.apk
          echo ======================================

          if exist app\build\outputs\apk\debug\app-debug.apk (
            copy app\build\outputs\apk\debug\app-debug.apk ScreenOffVN-v${{ github.ref_name || 'latest' }}.apk
            echo Copy thanh cong! Su dung app-debug.apk
          ) else (
            for %%f in (app\build\outputs\apk\debug\*.apk) do (
              copy "%%f" ScreenOffVN-v${{ github.ref_name || 'latest' }}.apk
              echo Copy thanh cong tu file %%\~nxf
            )
          )

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ScreenOffVN-APK
          path: ScreenOffVN-*.apk

      - name: Tao GitHub Release V${{ github.ref_name }} Latest
        if: startsWith(github.ref, 'refs/tags/v')
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: V${{ github.ref_name }} Latest
          body: |
            Merge pull request tu main



            Tai **ScreenOffVN-v${{ github.ref_name }}.apk** ve xai luon bro! 💥
          artifacts: ScreenOffVN-*.apk
          draft: false
          prerelease: false
