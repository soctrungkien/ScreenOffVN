<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Điều khiển ScreenOff</title>

    <!-- Material Web Components & QR Code -->
    <script type="module" src="./index.js"></script>
    <script type="module">
        import '@material/web/all.js';
        import QRCodeStyling from 'qr-code-styling';

        const serverUrl = '{{url}}';
        const finalUrl = (serverUrl.startsWith('http') && !serverUrl.includes('{{')) ? serverUrl : window.location.href;

        async function updateStatus() {
            try {
                const r = await fetch('/status?' + Math.random());
                const data = await r.json();
                const stateEl = document.querySelector('#state-text');
                if (stateEl) stateEl.innerText = data.state;
                const toggle = document.querySelector('#screen-toggle');
                if (toggle && toggle.selected !== data.isOff) {
                    toggle.selected = data.isOff;
                }
            } catch (e) {
                console.error('Status sync error:', e);
            }
        }

        window.addEventListener('load', () => {
            const qrCode = new QRCodeStyling({
                width: 200,
                height: 200,
                type: "svg",
                data: finalUrl,
                dotsOptions: {
                    color: "#000",
                    type: "rounded"
                },
                backgroundOptions: {
                    color: "#fff",
                },
                cornersSquareOptions: {
                    type: "extra-rounded",
                    color: "#000"
                }
            });

            const qrContainer = document.getElementById("qrcode");
            if (qrContainer) {
                qrContainer.innerHTML = '';
                qrCode.append(qrContainer);
            }

            const toggle = document.querySelector('#screen-toggle');
            if (toggle) {
                toggle.addEventListener('change', async (e) => {
                    const isSpecial = e.target.selected;
                    const url = isSpecial ? '2?' : '1?';
                    try {
                        await fetch(url + Math.random());
                        setTimeout(updateStatus, 300);
                    } catch (err) {
                        console.error(err);
                    }
                });
            }

            setInterval(updateStatus, 2000);
            updateStatus();
        });
    </script>

    <!-- Google Sans / Roboto Flex for Pixel Look -->
    <style>
        @font-face {
            font-family: 'Roboto Flex', sans-serif;
            src: url('RobotoFlex.tff') format('tff')
        }
    </style>

    <style>
        :root {
            /* Pixel UI Dark Mode Palette */
            --md-sys-color-primary: #a8c7fa; /* Pixel Blue Accent */
            --md-sys-color-on-primary: #062e6f;
            --md-sys-color-primary-container: #0842a0;
            --md-sys-color-on-primary-container: #d3e3fd;
            --md-sys-color-surface: #1a1c1e; /* Deep Pixel Gray */
            --md-sys-color-on-surface: #e2e2e6;
            --md-sys-color-surface-container: #202427;
            --md-sys-color-on-surface-variant: #c4c7c5;
            --md-sys-color-outline: #8e918f;

            font-family: 'Roboto Flex', sans-serif;
            color-scheme: dark;
        }

        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface);
            min-height: 100vh;
            padding: 24px;
            box-sizing: border-box;
        }

        .container {
            max-width: 420px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card {
            background-color: var(--md-sys-color-surface-container);
            border-radius: 24px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        #qrcode {
            background: #ffffff;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        #qrcode > * {
            width: 180px;
            height: 180px;
        }

        .info-list {
            width: 100%;
            text-align: left;
            margin: 8px 0;
            --md-list-container-color: transparent;
        }

        md-list-item {
            --md-list-item-label-text-color: var(--md-sys-color-on-surface);
            --md-list-item-supporting-text-color: var(--md-sys-color-on-surface-variant);
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            margin-top: 12px;
        }

        .toggle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 20px 24px;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            box-sizing: border-box;
        }

        .toggle-label {
            font-size: 17px;
            font-weight: 500;
            color: var(--md-sys-color-on-surface);
        }

        h1 {
            margin: 0 0 8px 0;
            font-size: 24px;
            font-weight: 500;
            letter-spacing: 0.1px;
        }

        p.subtitle {
            color: var(--md-sys-color-on-surface-variant);
            line-height: 1.5;
            margin: 0;
            font-size: 14px;
        }

        md-switch {
            --md-switch-selected-handle-color: var(--md-sys-color-primary);
            --md-switch-selected-track-color: var(--md-sys-color-primary-container);
        }

        #state-text {
            color: var(--md-sys-color-primary);
            font-weight: 700;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Điều khiển ScreenOff</h1>
        <div id="qrcode"></div>
        <p class="subtitle">Quét mã QR để điều khiển trên thiết bị khác</p>
    </div>

    <div class="card">
        <md-list class="info-list">
            <md-list-item>
                <div slot="headline">Tên Bluetooth</div>
                <div slot="supporting-text">{{brand}}</div>
            </md-list-item>
        </md-list>

        <div class="actions">
            <div class="toggle-row">
                <span class="toggle-label">Chế độ tắt màn hình</span>
                <md-switch id="screen-toggle" {{checked}}></md-switch>
            </div>
        </div>
    </div>
</div>

</body>
</html>
